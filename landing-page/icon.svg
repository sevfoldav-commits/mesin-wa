<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#25D366"/>
      <stop offset="50%" stop-color="#128C7E"/>
      <stop offset="100%" stop-color="#075E54"/>
    </linearGradient>
    <linearGradient id="wGrad" x1="0" y1="0.2" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f7f4"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000040"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>
  <!-- Inner circle -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- Phone icon -->
  <g transform="translate(256,250)" filter="url(#shadow)">
    <!-- Phone body -->
    <rect x="-48" y="-72" width="96" height="152" rx="16" ry="16" fill="url(#wGrad)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <!-- Screen -->
    <rect x="-36" y="-58" width="72" height="108" rx="4" ry="4" fill="#075E54" opacity="0.1"/>
    <!-- Chat bubbles -->
    <rect x="-24" y="-46" width="40" height="10" rx="5" fill="#25D366" opacity="0.7"/>
    <rect x="-24" y="-30" width="48" height="10" rx="5" fill="#25D366" opacity="0.5"/>
    <rect x="-24" y="-14" width="36" height="10" rx="5" fill="#25D366" opacity="0.3"/>
    <!-- Bottom dot -->
    <circle cx="0" cy="70" r="3" fill="rgba(255,255,255,0.5)"/>
  </g>
  <!-- Multi-device arrows -->
  <g transform="translate(256,256)" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round">
    <path d="M 50,-50 Q 100,-80 130,-50" stroke-dasharray="6 4"/>
    <path d="M 50,50 Q 100,80 130,50" stroke-dasharray="6 4"/>
    <path d="M -50,-50 Q -100,-80 -130,-50" stroke-dasharray="6 4"/>
    <path d="M -50,50 Q -100,80 -130,50" stroke-dasharray="6 4"/>
  </g>
  <!-- "W" letter -->
  <text x="256" y="370" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="48" fill="white" opacity="0.3">Mesin</text>
</svg>
